name: Tests

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and dependencies
        run: pip install -e ".[experiments]" 2>/dev/null || pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
